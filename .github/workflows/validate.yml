name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate JSON files
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/atw_mini/manifest.json > /dev/null
          python -m json.tool custom_components/atw_mini/translations/en.json > /dev/null

      - name: Check Python syntax
        run: python -m compileall custom_components tests

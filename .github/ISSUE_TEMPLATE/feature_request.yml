name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the use case and how it should work in Home Assistant.
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Describe the expected behavior, entity type, or workflow.
    validations:
      required: true

